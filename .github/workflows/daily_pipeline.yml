name: Daily Job Market ETL Pipeline

on:
  schedule:
    # 01:30 CEST
    - cron: '30 23 * * *'
  workflow_dispatch:

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the code from the GitHub repository
    - name: Checkout Repository
      uses: actions/checkout@v3

    # 2. Set up the Python environment on the server
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    # 3. Cleanly install all dependencies from requirements.txt
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    # 4. Install Playwright core browser on the Linux runner
    - name: Install Playwright Chromium
      run: python -m playwright install chromium

    # 5. Step A: Execute ingestion
    - name: Execute Job Ingestion (API Fetch)
      env:
        BA_CLIENT_ID: ${{ secrets.BA_CLIENT_ID }} 
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      run: python -m src.fetch_ba_jobs

    # 6. Step B: Execute transformation & S3 synchronization
    - name: Execute Transformation & S3-Sync
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      run: python -m src.transform_and_clean