name: Daily Job Market ETL Pipeline

on:
  schedule:
    # Führt den Job jeden Tag um 02:00 Uhr UTC aus (ca. 03:00 / 04:00 Uhr deutsche Zeit)
    - cron: '0 2 * * *'
  workflow_dispatch: # Erlaubt es dir, die Pipeline jederzeit händisch bei GitHub per Klick zu starten

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
    # 1. Code aus dem GitHub Repository auschecken
    - name: Checkout Repository
      uses: actions/checkout@v3

    # 2. Python-Umgebung auf dem Server aufsetzen (mit Pip-Caching)
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11' # Stabilste Version für Playwright im Linux-Umfeld
        cache: 'pip'

    # 3. Alle Abhängigkeiten sauber aus der requirements.txt installieren
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    # 4. Playwright Core-Browser (Chromium) auf dem Linux-Runner installieren
    - name: Install Playwright Chromium
      run: python -m playwright install chromium

    # 5. Schritt A: Ingestion ausführen (Sucht neue Jobs & lädt Bronze-Layer zu S3)
    - name: Execute Job Ingestion (API Fetch)
      env:
        BA_CLIENT_ID: ${{ secrets.BA_CLIENT_ID }} 
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      run: python fetch_ba_jobs_de_v3.py

    # 6. Schritt B: Transformation & S3-Synchronisation ausführen (Silver-Layer zu S3)
    - name: Execute Transformation & S3-Sync
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      run: python transform_and_clean_de_v3.py